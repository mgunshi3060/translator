<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>多言語同時翻訳ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f0f0f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    min-height: 100vh;
  }
  .app-header {
    background: #1a1a2e;
    color: white;
    padding: 20px 16px;
    text-align: center;
  }
  .app-header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .app-header p { font-size: 12px; opacity: 0.65; margin-top: 4px; }
  .lang-badges {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .lang-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    color: white;
  }
  .app-body { padding: 14px; }
  .input-label {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    margin-bottom: 5px;
  }
  textarea {
    width: 100%;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 11px;
    font-size: 15px;
    font-family: inherit;
    color: #333;
    background: #fafafa;
    resize: none;
    height: 90px;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: #1a1a2e; background: #fff; }
  .btn-row {
    display: flex;
    gap: 7px;
    margin: 10px 0;
  }
  .btn-primary {
    flex: 1;
    padding: 12px;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:active { opacity: 0.8; transform: scale(0.98); }
  .btn-secondary {
    padding: 12px 13px;
    background: transparent;
    color: #666;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-secondary:active { background: #f5f5f5; }
  .result-card {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 7px;
    background: #f9f9fb;
  }
  .result-lang {
    font-size: 10px;
    font-weight: 700;
    color: #888;
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }
  .result-text { font-size: 14px; color: #222; line-height: 1.55; }
  .loading { text-align: center; padding: 16px; color: #888; font-size: 13px; }
  .dot { display: inline-block; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 14px 0 7px;
    padding-top: 10px;
    border-top: 1px solid #eee;
  }
  .history-label { font-size: 12px; font-weight: 700; color: #444; }
  .history-clear {
    font-size: 11px; color: #c0392b; cursor: pointer;
    background: none; border: none; font-family: inherit;
  }
  .history-item {
    border: 1px solid #eee; border-radius: 10px;
    padding: 9px 12px; margin-bottom: 6px;
    cursor: pointer; background: #fff;
  }
  .history-item:active { background: #f5f5f5; }
  .history-no { font-size: 10px; color: #aaa; margin-bottom: 2px; }
  .history-text { font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty-state { text-align: center; color: #bbb; font-size: 12px; padding: 10px 0; }
  .error-msg { color: #c0392b; font-size: 12px; padding: 10px; text-align: center; background: #fff5f5; border-radius: 10px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>🌐 多言語同時翻訳</h1>
    <p>日本語 → 4言語に瞬時翻訳（完全無料）</p>
    <div class="lang-badges">
      <span class="lang-badge">🇬🇧 English</span>
      <span class="lang-badge">🇮🇳 हिन्दी</span>
      <span class="lang-badge">🇵🇰 اردو</span>
      <span class="lang-badge">🇧🇩 বাংলা</span>
    </div>
  </div>
  <div class="app-body">
    <div class="input-label">日本語テキストを入力</div>
    <textarea id="inputText" placeholder="例：こんにちは、元気ですか？"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="runTranslate()">翻訳する →</button>
      <button class="btn-secondary" onclick="clearInput()">クリア</button>
      <button class="btn-secondary" onclick="saveToHistory()">保存</button>
    </div>
    <div id="resultsSection"></div>
    <div class="history-header">
      <span class="history-label">翻訳履歴</span>
      <button class="history-clear" onclick="clearHistory()">履歴削除</button>
    </div>
    <div id="historyList"><div class="empty-state">履歴はありません</div></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzKxkZsH-BSkpvtl1EnDANjWcsO-L4nXtBpnnly2qITkz0c5M9iOJWB9vI8rtrSUe6N/exec';
const historyList = [];
let currentResults = null;

// ---- JSONP方式でCORSを回避 ----
function callGAS(text) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now();
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウト（15秒）。GASのデプロイ設定を確認してください。'));
    }, 15000);

    function cleanup() {
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
      clearTimeout(timeout);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.src = `${GAS_URL}?text=${encodeURIComponent(text)}&callback=${cbName}`;
    script.onerror = () => {
      cleanup();
      reject(new Error('スクリプト読み込みエラー。URLを確認してください。'));
    };
    document.body.appendChild(script);
  });
}

async function runTranslate() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('テキストを入力してください'); return; }

  const rs = document.getElementById('resultsSection');
  rs.innerHTML = '<div class="loading"><span class="dot">●</span><span class="dot">●</span><span class="dot">●</span> 翻訳中...</div>';

  try {
    const data = await callGAS(text);
    if (data.error) throw new Error(data.error);
    currentResults = { input: text, ...data };
    showResults(data);
  } catch(e) {
    rs.innerHTML = `<div class="error-msg">エラー: ${e.message || '翻訳に失敗しました。再度お試しください。'}</div>`;
  }
}

function showResults(r) {
  const langs = [
    { key: 'english', label: '🇬🇧 English' },
    { key: 'hindi',   label: '🇮🇳 हिन्दी (Hindi)' },
    { key: 'urdu',    label: '🇵🇰 اردو (Urdu)' },
    { key: 'bengali', label: '🇧🇩 বাংলা (Bengali)' }
  ];
  document.getElementById('resultsSection').innerHTML = langs.map(l => `
    <div class="result-card">
      <div class="result-lang">${l.label}</div>
      <div class="result-text">${r[l.key] || ''}</div>
    </div>
  `).join('');
}

function saveToHistory() {
  if (!currentResults) return;
  historyList.unshift({ no: historyList.length + 1, ...currentResults });
  renderHistory();
}

function clearInput() {
  document.getElementById('inputText').value = '';
  document.getElementById('resultsSection').innerHTML = '';
  currentResults = null;
}

function clearHistory() {
  historyList.length = 0;
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!historyList.length) { el.innerHTML = '<div class="empty-state">履歴はありません</div>'; return; }
  el.innerHTML = historyList.slice(0, 10).map(h => `
    <div class="history-item" onclick="loadHistory(${h.no})">
      <div class="history-no">No.${h.no}</div>
      <div class="history-text">${h.input}</div>
    </div>
  `).join('');
}

function loadHistory(no) {
  const h = historyList.find(x => x.no === no);
  if (!h) return;
  document.getElementById('inputText').value = h.input;
  showResults(h);
  currentResults = h;
}
</script>
</body>
</html>
